<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CF × GitHub Sync</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="popup.css" />
</head>
<body>

  <!-- Header -->
  <header class="header">
    <div class="logo">
      <div class="logo-icon">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M9 19c-5 1.5-5-2.5-7-3m14 6v-3.87a3.37 3.37 0 0 0-.94-2.61c3.14-.35 6.44-1.54 6.44-7A5.44 5.44 0 0 0 20 4.77 5.07 5.07 0 0 0 19.91 1S18.73.65 16 2.48a13.38 13.38 0 0 0-7 0C6.27.65 5.09 1 5.09 1A5.07 5.07 0 0 0 5 4.77a5.44 5.44 0 0 0-1.5 3.78c0 5.42 3.3 6.61 6.44 7A3.37 3.37 0 0 0 9 18.13V22"/>
        </svg>
      </div>
      <div class="logo-text">
        <span class="logo-title">CF × GitHub</span>
        <span class="logo-sub">Sync</span>
      </div>
    </div>
    <button class="settings-btn" id="open-settings" title="Open Settings">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="16" height="16">
        <circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/>
      </svg>
    </button>
  </header>

  <!-- Status Bar -->
  <div class="status-bar" id="status-bar">
    <div class="status-indicator" id="status-indicator"></div>
    <span id="status-text">Checking...</span>
  </div>

  <!-- Stats Row -->
  <div class="stats-row">
    <div class="stat-card">
      <span class="stat-num" id="stat-total">0</span>
      <span class="stat-label">Synced</span>
    </div>
    <div class="stat-divider"></div>
    <div class="stat-card">
      <span class="stat-num" id="stat-today">0</span>
      <span class="stat-label">Today</span>
    </div>
    <div class="stat-divider"></div>
    <div class="stat-card">
      <div class="auto-sync-toggle">
        <label class="toggle" for="auto-sync-chk">
          <input type="checkbox" id="auto-sync-chk" />
          <span class="toggle-slider"></span>
        </label>
      </div>
      <span class="stat-label">Auto-sync</span>
    </div>
  </div>

  <!-- Not configured warning -->
  <div class="warning-box" id="warning-box" style="display:none">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="16" height="16">
      <path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"/>
      <line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/>
    </svg>
    <span>Setup required — <a href="#" id="go-setup">Open Settings →</a></span>
  </div>

  <!-- History -->
  <div class="section">
    <div class="section-header">
      <span class="section-title">Recent Syncs</span>
      <button class="clear-btn" id="clear-history" title="Clear history">Clear</button>
    </div>
    <div class="history-list" id="history-list">
      <div class="empty-state" id="empty-state">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" width="32" height="32">
          <path d="M9 19c-5 1.5-5-2.5-7-3m14 6v-3.87a3.37 3.37 0 0 0-.94-2.61c3.14-.35 6.44-1.54 6.44-7A5.44 5.44 0 0 0 20 4.77 5.07 5.07 0 0 0 19.91 1S18.73.65 16 2.48a13.38 13.38 0 0 0-7 0C6.27.65 5.09 1 5.09 1A5.07 5.07 0 0 0 5 4.77a5.44 5.44 0 0 0-1.5 3.78c0 5.42 3.3 6.61 6.44 7A3.37 3.37 0 0 0 9 18.13V22"/>
        </svg>
        <p>No synced solutions yet.</p>
        <p class="empty-sub">Solve a problem on Codeforces to start!</p>
      </div>
    </div>
  </div>

  <!-- Footer -->
  <footer class="footer">
    <span>CF × GitHub Sync v1.0</span>
    <a href="#" id="view-repo" class="footer-link">View Repo →</a>
  </footer>

  <script src="popup.js"></script>
</body>
</html>
